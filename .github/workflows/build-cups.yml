name: Build CUPS on New Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Get latest CUPS release version
        id: get_version
        run: |
          LATEST_TAG=$(curl -sL https://api.github.com/repos/OpenPrinting/cups/releases/latest | jq -r ".tag_name")
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest upstream release is $LATEST_TAG"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: check_image
        run: |
          export DOCKER_CLI_EXPERIMENTAL=enabled
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.tag }} > /dev/null 2>&1; then
            echo "Image for version ${{ steps.get_version.outputs.tag }} already exists. Skipping build."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Image not found. Proceeding with build."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check_image.outputs.exists == 'false'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        if: steps.check_image.outputs.exists == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.get_version.outputs.tag }}

      - name: Build and push Docker image
        if: steps.check_image.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            CUPS_VERSION=${{ steps.get_version.outputs.tag }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max